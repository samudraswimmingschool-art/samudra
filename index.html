<style>
  html,body{
    margin:0; padding:0; height:100%;
    background:#0b3a75;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }
  .wrap{
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    color:#ffffff; padding:24px;
  }
  .logo{
    width:120px; height:120px; border-radius:24px;
    background:#ffffff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 24px rgba(0,0,0,.25); margin-bottom:22px;
    overflow:hidden;
  }
  .logo img{ width:100%; height:100%; object-fit:contain; }
  h1{ font-size:20px; margin:0 0 8px; font-weight:800; }
  p{ font-size:14px; opacity:.85; margin:0 0 20px; }
  .btn{
    display:inline-block; background:#ffffff; color:#0b3a75;
    text-decoration:none; font-weight:800; font-size:15px;
    padding:12px 26px; border-radius:12px;
  }
  .spin{
    width:26px; height:26px; margin-top:18px;
    border:3px solid rgba(255,255,255,.3); border-top-color:#fff;
    border-radius:50%; animation:putar .8s linear infinite;
  }
  @keyframes putar{ to{ transform:rotate(360deg); } }
</style>
